steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm ci
  displayName: 'npm ci'

- script: |
    export VITE_BUILD_ID=$(Build.SourceVersion) 
    npm run build
  displayName: 'npm run build'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: 'dist'
    ArtifactName: 'front-dist'
    publishLocation: 'Container'